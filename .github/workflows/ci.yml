name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend lint + type check
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff check
        run: ruff check app/ tests/

      - name: Black format check
        run: black --check app/ tests/

      - name: MyPy type check
        run: mypy app/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Backend tests (needs PostgreSQL service)
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wealthbot_user
          POSTGRES_PASSWORD: wealthbot_secret
          POSTGRES_DB: wealthbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wealthbot_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: "postgresql+asyncpg://wealthbot_user:wealthbot_secret@localhost:5432/wealthbot_test"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      APP_ENV: "testing"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PostgreSQL extensions
        run: |
          PGPASSWORD=wealthbot_secret psql -h localhost -U wealthbot_user -d wealthbot_test -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
          PGPASSWORD=wealthbot_secret psql -h localhost -U wealthbot_user -d wealthbot_test -c 'CREATE EXTENSION IF NOT EXISTS "pg_trgm";'

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80 -q

  # ---------------------------------------------------------------------------
  # Frontend lint + type check + build
  # ---------------------------------------------------------------------------
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npm run lint

      - name: Build check
        run: npm run build
